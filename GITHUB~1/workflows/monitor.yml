name: Travel Monitor

on:
  schedule:
    # Executa todo dia às 09:00 UTC (06:00 em Brasília). Ajuste se quiser.
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # permite rodar manualmente pela aba Actions

permissions:
  contents: write          # necessário para commitar o histórico atualizado

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar navegador do Playwright (para scraping com JS)
        run: python -m playwright install --with-deps chromium

      - name: Preparar config a partir do exemplo
        run: cp config.yaml.example config.yaml

      - name: Executar monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          # Credenciais opcionais de provedores reais:
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
        run: python main.py

      - name: Commitar histórico atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          if git diff --staged --quiet; then
            echo "Sem mudanças no histórico."
          else
            git commit -m "chore: atualiza histórico de preços [skip ci]"
            git push
          fi
